# Standalone Postgres for Tabish Friday Labor (does not touch ShopRally DB)
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tabish_friday_labor
    ports:
      - "5433:5432"
    volumes:
      - tfl_pg:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  tfl_pg:
